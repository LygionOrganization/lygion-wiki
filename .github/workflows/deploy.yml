name: Deploy Lygion Wiki

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: lygion-wiki-deploy
  cancel-in-progress: true

jobs:
  build:
    name: Build MkDocs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build MkDocs site
        run: |
          mkdocs build --clean --strict

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Upload site artifact for Aliyun deploy
        uses: actions/upload-artifact@v4
        with:
          name: lygion-wiki-site
          path: site

  deploy-github-pages:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-aliyun:
    name: Deploy to Aliyun Server
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: lygion-wiki-site
          path: site

      - name: Deploy site to Aliyun by rsync
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.ALIYUN_HOST }}
          REMOTE_USER: ${{ secrets.ALIYUN_USER }}
          REMOTE_PORT: ${{ secrets.ALIYUN_PORT }}
          SOURCE: "site/"
          TARGET: ${{ secrets.ALIYUN_TARGET_DIR }}
          ARGS: "-rlgoDzvc --delete"